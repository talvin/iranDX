name: Poo poo - Batch Download from URLs & Save to Repo

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download (or .txt file URL)'
        required: true
        type: string
      batch_mode:
        description: 'Batch processing mode'
        required: false
        default: 'sequential'
        type: choice
        options:
          - sequential
          - parallel
          - url_file
      parallel_jobs:
        description: 'Number of parallel downloads (1-10, only for parallel mode)'
        required: false
        default: 3
        type: number
      mode:
        description: 'Output mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: 90
        type: number
      youtube_format:
        description: 'YouTube quality (best/bestvideo+bestaudio/bestaudio/worst)'
        required: false
        default: 'best'
        type: string
      output_name:
        description: 'Custom output filename (use {title} for original)'
        required: false
        default: '{title}'
        type: string
      convert_format:
        description: 'Convert to format'
        required: false
        default: 'keep'
        type: choice
        options:
          - keep
          - mp4
          - mkv
          - webm
          - mp3
          - m4a
          - wav
          - opus

jobs:
  batch-downloader:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: client
          stack: dual
          configure_docker: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yt-dlp and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip ffmpeg python3-pip parallel
          pip3 install yt-dlp --break-system-packages

      - name: Prepare URL list
        run: |
          BATCH_MODE="${{ github.event.inputs.batch_mode }}"
          URLS="${{ github.event.inputs.urls }}"
          
          if [ "$BATCH_MODE" = "url_file" ]; then
            echo "📄 Downloading URL list from: $URLS"
            curl -L -o url_list.txt "$URLS"
            echo "URLs loaded from file:"
            cat url_list.txt
            # Convert to space-separated list
            URLS=$(cat url_list.txt | tr '\n' ' ')
          fi
          
          # Save URLS to environment
          echo "URLS_LIST=$URLS" >> $GITHUB_ENV
          echo "BATCH_MODE=$BATCH_MODE" >> $GITHUB_ENV

      - name: Download function (for parallel execution)
        run: |
          # Create download script for parallel
          cat > /tmp/download_one.sh << 'EOF'
          #!/bin/bash
          URL="$1"
          OUTPUT_NAME="$2"
          CONVERT_FORMAT="$3"
          YT_FORMAT="$4"
          
          echo "🚀 Starting: $URL"
          
          if [[ "$URL" =~ (youtube\.com|youtu\.be) ]]; then
            CMD="yt-dlp -f \"$YT_FORMAT\" --no-playlist --retries 5"
            
            if [ "$CONVERT_FORMAT" != "keep" ]; then
              if [[ "$CONVERT_FORMAT" == "mp3" || "$CONVERT_FORMAT" == "m4a" || "$CONVERT_FORMAT" == "wav" || "$CONVERT_FORMAT" == "opus" ]]; then
                CMD="$CMD --extract-audio --audio-format $CONVERT_FORMAT"
              else
                CMD="$CMD --recode-video $CONVERT_FORMAT"
              fi
            else
              CMD="$CMD --merge-output-format mkv"
            fi
            
            if [[ "$OUTPUT_NAME" == *"{title}"* ]]; then
              CMD="$CMD -o \"${OUTPUT_NAME}.%(ext)s\""
            else
              CMD="$CMD -o \"${OUTPUT_NAME}_%(title)s.%(ext)s\""
            fi
            
            cd tmp_downloads
            eval $CMD "$URL" 2>&1 | head -20
            cd ..
          else
            FILENAME=$(basename "$URL")
            aria2c --split=2 --max-connection-per-server=2 --dir="tmp_downloads" --out="$FILENAME" "$URL"
          fi
          
          echo "✅ Finished: $URL"
          EOF
          
          chmod +x /tmp/download_one.sh

      - name: Run batch downloads
        run: |
          MODE="${{ github.event.inputs.mode }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          YT_FORMAT="${{ github.event.inputs.youtube_format }}"
          OUTPUT_NAME="${{ github.event.inputs.output_name }}"
          CONVERT_FORMAT="${{ github.event.inputs.convert_format }}"
          PARALLEL_JOBS="${{ github.event.inputs.parallel_jobs }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          mkdir -p downloads tmp_downloads

          echo "📦 Batch mode: $BATCH_MODE"
          
          if [ "$BATCH_MODE" = "parallel" ]; then
            # Parallel downloads
            echo "⚡ Downloading $PARALLEL_JOBS files in parallel..."
            
            # Convert space-separated to line-separated for parallel
            echo $URLS_LIST | tr ' ' '\n' > /tmp/urls.txt
            
            cat /tmp/urls.txt | parallel -j $PARALLEL_JOBS \
              /tmp/download_one.sh {} "$OUTPUT_NAME" "$CONVERT_FORMAT" "$YT_FORMAT"
              
          elif [ "$BATCH_MODE" = "sequential" ]; then
            # Sequential downloads (original behavior)
            echo "🐢 Sequential download mode..."
            
            for URL in $URLS_LIST; do
              /tmp/download_one.sh "$URL" "$OUTPUT_NAME" "$CONVERT_FORMAT" "$YT_FORMAT"
            done
          fi

      - name: Process outputs (zip/split)
        run: |
          MODE="${{ github.event.inputs.mode }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/batch_archive_$(date +%Y%m%d_%H%M%S).zip"
            echo "📦 Creating zip archive: $ARCHIVE_NAME"
            zip -j "$ARCHIVE_NAME" tmp_downloads/* 2>/dev/null || true
            rm -rf tmp_downloads
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "0")
              BASENAME=$(basename "$FILE")

              if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "✂️ Splitting $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"
                zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${BASENAME}.zip" -j "$FILE"
              else
                cp "$FILE" "downloads/$BASENAME"
              fi
            done
            rm -rf tmp_downloads
          fi

      - name: Commit & Push results
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/ || true
          if git diff --staged --quiet; then
            echo "No new files to commit."
            exit 0
          fi

          git commit -m "[Poo poo] Batch download $(date +%Y%m%d_%H%M%S) [skip ci]"
          git pull --rebase origin "$BRANCH" || true
          git push origin HEAD:"$BRANCH"
          echo "🎉 Batch download complete!"
